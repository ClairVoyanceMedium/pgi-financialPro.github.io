<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PGI • Financial Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020812;
  --bg2:#06101d;
  --panel:rgba(3,12,24,.78);
  --glass:rgba(7,18,34,.62);
  --line:rgba(118,206,255,.18);
  --text:#eaf7ff;
  --muted:#8da7ba;
  --cyan:#39eaff;
  --cyan2:#78f7ff;
  --green:#18ff72;
  --red:#ff2d4d;
  --purple:#b970ff;
  --blue:#36aaff;
  --yellow:#ffd629;
  --orange:#ff9b22;
  --radius:18px;
  --font-ui:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-tech:"Orbitron","Inter",system-ui,sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -10%,rgba(57,234,255,.12),transparent 28%),linear-gradient(180deg,#020710,#01040a 65%,#020710);color:var(--text);font-family:var(--font-ui);overflow-x:hidden}
body{padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}

.app{
  width:min(100%,960px);
  margin:0 auto;
  padding:14px;
}

.shell{
  border:1px solid rgba(57,234,255,.22);
  border-radius:28px;
  background:
    radial-gradient(circle at 15% 5%,rgba(57,234,255,.08),transparent 26%),
    radial-gradient(circle at 90% 70%,rgba(185,112,255,.08),transparent 24%),
    rgba(2,8,18,.72);
  box-shadow:0 0 45px rgba(57,234,255,.08), inset 0 0 30px rgba(57,234,255,.035);
  padding:22px 16px 18px;
  overflow:hidden;
}

.header{
  text-align:center;
  position:relative;
  padding:4px 0 16px;
}
.brand{
  font-family:var(--font-tech);
  font-weight:300;
  letter-spacing:.065em;
  font-size:clamp(31px,9vw,64px);
  line-height:1;
  color:#dffcff;
  text-shadow:
    0 0 5px rgba(120,247,255,.95),
    0 0 16px rgba(57,234,255,.58),
    0 0 38px rgba(57,234,255,.26);
  white-space:nowrap;
}
.brand .dot{
  display:inline-block;
  color:var(--cyan);
  margin:0 .12em;
  text-shadow:0 0 8px rgba(57,234,255,1),0 0 22px rgba(57,234,255,.75);
}
.subtitle{
  margin-top:12px;
  font-family:var(--font-tech);
  font-size:clamp(9px,2.45vw,16px);
  font-weight:400;
  letter-spacing:.28em;
  color:#a9f7ff;
  text-shadow:0 0 12px rgba(57,234,255,.38);
  white-space:nowrap;
}
.top-gear{
  position:absolute;
  right:2px;
  top:2px;
  width:42px;
  height:42px;
  border:1px solid rgba(57,234,255,.25);
  border-radius:50%;
  display:none;
  place-items:center;
  color:#d9f8ff;
  filter:drop-shadow(0 0 8px rgba(57,234,255,.35));
}

.ticker{
  position:relative;
  height:58px;
  border:1px solid rgba(57,234,255,.42);
  border-radius:16px;
  background:linear-gradient(180deg,rgba(5,16,29,.78),rgba(2,8,18,.82));
  box-shadow:0 0 22px rgba(57,234,255,.12), inset 0 0 18px rgba(57,234,255,.04);
  display:grid;
  grid-template-columns:minmax(0,1fr) 48px;
  overflow:hidden;
  margin-bottom:18px;
}
.ticker-viewport{
  min-width:0;
  overflow:hidden;
  display:flex;
  align-items:center;
  mask-image:linear-gradient(90deg,transparent 0,#000 16px,#000 calc(100% - 30px),transparent 100%);
}
.ticker-track{
  display:flex;
  align-items:center;
  gap:0;
  animation:tickerMove 34s linear infinite;
  will-change:transform;
}
.ticker:hover .ticker-track{animation-play-state:paused}
.ticker-item{
  min-width:max-content;
  padding:0 18px;
  border-right:1px solid rgba(120,247,255,.18);
  font-size:13px;
}
.ticker-item b{display:block;font-weight:600;color:#e8f8ff;margin-bottom:2px}
.ticker-item .price{font-family:var(--font-tech);font-size:13px;color:#d8e9f2}
.ticker-item .up{color:var(--green);font-weight:600}
.ticker-item .down{color:var(--red);font-weight:600}
.ticker-gear{
  border-left:1px solid rgba(120,247,255,.18);
  display:grid;
  place-items:center;
  background:rgba(2,8,18,.86);
  position:relative;
  z-index:3;
}
.ticker-gear button{
  width:34px;height:34px;border:0;background:transparent;color:#dffbff;cursor:pointer;
  filter:drop-shadow(0 0 7px rgba(57,234,255,.52));
}
@keyframes tickerMove{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:14px;
}
.card{
  position:relative;
  overflow:hidden;
  border-radius:18px;
  background:linear-gradient(180deg,rgba(4,14,28,.82),rgba(2,8,18,.86));
  min-width:0;
}
.clock{
  height:170px;
  padding:18px 12px 10px;
  text-align:center;
}
.clock.open{
  border:1px solid rgba(57,234,255,.78);
  box-shadow:
    0 0 14px rgba(57,234,255,.48),
    0 0 34px rgba(57,234,255,.18),
    inset 0 0 18px rgba(57,234,255,.055);
}
.clock.closed{
  border:1px solid rgba(255,45,77,.78);
  box-shadow:
    0 0 14px rgba(255,45,77,.50),
    0 0 34px rgba(255,45,77,.18),
    inset 0 0 18px rgba(255,45,77,.055);
}
.clock h3{
  margin:0 0 8px;
  font-size:23px;
  line-height:1.05;
  font-weight:500;
  letter-spacing:.01em;
}
.time{
  font-family:var(--font-tech);
  font-size:26px;
  font-weight:300;
  letter-spacing:.08em;
  color:#f5fbff;
  text-shadow:0 0 9px rgba(255,255,255,.18);
}
.status{
  margin-top:8px;
  font-size:14px;
  font-weight:600;
  letter-spacing:.08em;
}
.open .status{color:var(--green);text-shadow:0 0 9px rgba(24,255,114,.45)}
.closed .status{color:var(--red);text-shadow:0 0 9px rgba(255,45,77,.45)}
.countdown{
  margin-top:8px;
  font-size:14px;
  font-weight:400;
  color:#f2f7fb;
}
.skyline{
  position:absolute;
  left:8px;right:8px;bottom:6px;
  height:58px;
  opacity:.55;
  pointer-events:none;
}
.open .skyline{color:#35dfff;filter:drop-shadow(0 0 5px rgba(57,234,255,.28))}
.closed .skyline{color:#ff3b58;filter:drop-shadow(0 0 5px rgba(255,45,77,.25))}
.skyline svg{width:100%;height:100%;display:block}
.skyline path,.skyline line,.skyline polyline,.skyline rect,.skyline circle{
  stroke:currentColor;fill:none;stroke-width:1.25;stroke-linecap:round;stroke-linejoin:round;
}

.sydney-news{
  display:grid;
  grid-column:1 / -1;
  grid-template-columns:1fr 2fr;
  gap:14px;
}
.sydney-news .clock{height:210px}

.news-card{
  height:210px;
  border:1px solid rgba(120,247,255,.25);
  box-shadow:0 0 18px rgba(57,234,255,.10), inset 0 0 16px rgba(57,234,255,.035);
  padding:14px 14px 10px;
}
.news-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px
}
.news-head h2{margin:0;font-size:20px;font-weight:600}
.live{
  color:#68ecff;
  font-size:11px;
  font-weight:700;
  letter-spacing:.08em;
  display:flex;align-items:center;gap:7px;
}
.live:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.news-scroll{
  position:relative;
  height:158px;
  overflow:auto;
  scroll-behavior:smooth;
  padding-right:8px;
}
.news-scroll::-webkit-scrollbar{width:3px}
.news-scroll::-webkit-scrollbar-thumb{background:rgba(57,234,255,.72);border-radius:999px}
.news-row{
  display:grid;
  grid-template-columns:30px minmax(0,1fr) 18px;
  gap:10px;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid rgba(120,247,255,.11);
  cursor:pointer;
}
.news-icon{font-size:22px;filter:drop-shadow(0 0 5px rgba(57,234,255,.22))}
.news-title{
  font-size:13px;
  line-height:1.24;
  color:#f0f7fb;
}
.news-time{
  display:block;
  color:#8198aa;
  font-size:11px;
  margin-top:2px;
}
.chev{color:#e8f6ff;font-size:20px}

.nav-grid{
  margin-top:18px;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
}
.nav-btn{
  --neon:var(--cyan);
  position:relative;
  min-height:96px;
  border:1px solid color-mix(in srgb,var(--neon) 76%,transparent);
  border-radius:16px;
  background:radial-gradient(circle at 50% 0%,color-mix(in srgb,var(--neon) 18%,transparent),transparent 46%),linear-gradient(180deg,rgba(8,17,31,.86),rgba(2,8,18,.92));
  color:#f7fcff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:21px;
  font-weight:400;
  cursor:pointer;
  box-shadow:
    0 0 6px color-mix(in srgb,var(--neon) 70%,transparent),
    0 0 18px color-mix(in srgb,var(--neon) 35%,transparent),
    inset 0 0 18px color-mix(in srgb,var(--neon) 6%,transparent);
  text-shadow:0 0 10px color-mix(in srgb,var(--neon) 30%,transparent);
  animation:neonFlicker 4.6s infinite;
}
.nav-btn svg{width:32px;height:32px;stroke:var(--neon);filter:drop-shadow(0 0 6px color-mix(in srgb,var(--neon) 65%,transparent))}
.nav-btn.scanner{
  --neon:#ffedf2;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.16),transparent 35%),linear-gradient(180deg,#ff2348,#a80020);
  border-color:#fff;
  box-shadow:0 0 7px rgba(255,255,255,.85),0 0 18px rgba(255,45,77,.85),0 0 38px rgba(255,45,77,.35),inset 0 0 22px rgba(255,255,255,.12);
}
.nav-btn.scanner svg{stroke:white}
.nav-btn.purple{--neon:var(--purple)}
.nav-btn.green{--neon:#19ff91}
.nav-btn.blue{--neon:#36aaff}
.nav-btn.yellow{--neon:var(--yellow);color:#fff0a8}
.nav-btn.cyan{--neon:#40dfff}
.nav-btn.gold{--neon:#ffce24;color:#ffd95e}
@keyframes neonFlicker{
  0%,100%{filter:brightness(1)}
  47%{filter:brightness(1.05)}
  48%{filter:brightness(.92)}
  49%{filter:brightness(1.12)}
  50%{filter:brightness(.98)}
}

.assistant{
  margin-top:18px;
  border:1px solid rgba(57,234,255,.28);
  border-radius:18px;
  background:linear-gradient(180deg,rgba(4,14,28,.78),rgba(2,8,18,.9));
  box-shadow:0 0 22px rgba(57,234,255,.08),inset 0 0 20px rgba(57,234,255,.03);
  padding:18px;
}
.section-title{
  margin:0 0 12px;
  display:flex;align-items:center;gap:12px;
  font-size:25px;font-weight:650;
}
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.chip{
  border:1px solid rgba(120,247,255,.18);
  background:rgba(14,31,50,.55);
  color:#dcebf4;
  border-radius:999px;
  padding:9px 14px;
  font-size:13px;
  white-space:nowrap;
}
.input-row{display:grid;grid-template-columns:minmax(0,1fr) 58px;gap:12px}
.input-row input{
  height:48px;border-radius:13px;border:1px solid rgba(120,247,255,.22);background:#050c17;color:white;padding:0 16px;outline:none;
}
.send{
  border:1px solid rgba(57,234,255,.85);border-radius:13px;background:rgba(57,234,255,.08);color:white;
  box-shadow:0 0 16px rgba(57,234,255,.55),inset 0 0 16px rgba(57,234,255,.12);
}
.rule{
  margin-top:14px;
  border:1px solid rgba(185,112,255,.52);
  border-radius:16px;
  background:linear-gradient(90deg,rgba(74,24,119,.42),rgba(9,12,26,.75));
  box-shadow:0 0 18px rgba(185,112,255,.22), inset 0 0 14px rgba(185,112,255,.06);
  padding:16px 18px;
  display:grid;
  grid-template-columns:48px 1fr 20px;
  gap:12px;
  align-items:center;
}
.rule h3{margin:0 0 3px;font-size:19px}
.rule p{margin:0;color:#d8e0ea;font-size:13px;line-height:1.32}

.hidden{display:none!important}

@media (max-width:600px){
  .app{padding:8px 6px}
  .shell{padding:14px 10px 12px;border-radius:20px}
  .header{padding-bottom:12px}
  .brand{font-size:clamp(30px,13vw,46px);letter-spacing:.05em}
  .subtitle{font-size:clamp(8px,2.65vw,11px);letter-spacing:.20em;white-space:normal;line-height:1.45}
  .ticker{height:53px;margin-bottom:12px;grid-template-columns:minmax(0,1fr) 38px}
  .ticker-item{padding:0 13px;font-size:11px}
  .ticker-item .price{font-size:11px}
  .ticker-gear button{width:30px;height:30px}
  .dashboard-grid{gap:9px}
  .clock{height:138px;padding:12px 5px 7px;border-radius:14px}
  .clock h3{font-size:16px;margin-bottom:5px}
  .time{font-size:18px;letter-spacing:.05em}
  .status{font-size:11px;margin-top:6px}
  .countdown{font-size:10px;margin-top:5px;line-height:1.2}
  .skyline{height:42px;left:5px;right:5px;bottom:4px;opacity:.52}
  .sydney-news{gap:9px;grid-template-columns:1fr 2fr}
  .sydney-news .clock,.news-card{height:198px}
  .news-card{border-radius:14px;padding:11px 10px 8px}
  .news-head h2{font-size:18px}
  .live{font-size:9px}
  .news-scroll{height:154px}
  .news-row{grid-template-columns:24px minmax(0,1fr) 12px;gap:7px;padding:7px 0}
  .news-icon{font-size:18px}
  .news-title{font-size:10px;line-height:1.18}
  .news-time{font-size:9px}
  .chev{font-size:16px}
  .nav-grid{margin-top:13px;gap:9px}
  .nav-btn{min-height:74px;border-radius:13px;font-size:15px;gap:5px}
  .nav-btn svg{width:25px;height:25px}
  .assistant{margin-top:13px;padding:14px 12px;border-radius:15px}
  .section-title{font-size:22px}
  .chip{font-size:11px;padding:7px 10px;max-width:100%;white-space:normal}
  .input-row{grid-template-columns:minmax(0,1fr) 48px}
  .input-row input{height:44px;font-size:13px}
  .rule{grid-template-columns:38px 1fr 14px;padding:13px;gap:8px}
  .rule h3{font-size:17px}
  .rule p{font-size:11px}
}

@media (max-width:380px){
  .shell{padding-left:8px;padding-right:8px}
  .dashboard-grid{gap:8px}
  .clock{height:126px;padding-top:10px}
  .clock h3{font-size:15px}
  .time{font-size:16px}
  .status{font-size:10px}
  .countdown{font-size:9px}
  .skyline{height:37px}
  .sydney-news .clock,.news-card{height:188px}
  .news-title{font-size:9.5px}
  .nav-grid{gap:8px}
  .nav-btn{min-height:68px;font-size:14px}
}
</style>
</head>
<body>
<div class="app">
  <main class="shell">
    <header class="header">
      <button class="top-gear" aria-label="Réglages">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.05.05a2 2 0 0 1-2.83 2.83l-.05-.05A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.07A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.05.05a2 2 0 0 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.07A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.05-.05a2 2 0 0 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.07A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.05-.05a2 2 0 0 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 0 1 0 4h-.07A1.7 1.7 0 0 0 19.4 15Z"/></svg>
      </button>
      <div class="brand">PGI<span class="dot">•</span>Financial Pro</div>
      <div class="subtitle">PLACE DES MARCHÉS · MACROÉCONOMIE · ACTUALITÉS MONDIALES</div>
    </header>

    <section class="ticker" aria-label="Valeurs suivies">
      <div class="ticker-viewport">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>
      <div class="ticker-gear">
        <button onclick="editTicker()" aria-label="Modifier les valeurs">
          <svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.05.05a2 2 0 0 1-2.83 2.83l-.05-.05A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.07A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.05.05a2 2 0 0 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.07A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.05-.05a2 2 0 0 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.07A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.05-.05a2 2 0 0 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 0 1 0 4h-.07A1.7 1.7 0 0 0 19.4 15Z"/></svg>
        </button>
      </div>
    </section>

    <section class="dashboard-grid" id="clocksGrid"></section>

    <nav class="nav-grid" aria-label="Navigation principale">
      <button class="nav-btn scanner" onclick="tab('scanner')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
        <span>Scanner</span>
      </button>
      <button class="nav-btn purple" onclick="tab('analyse')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M3 19h18"/><path d="M5 15l4-4 3 3 6-8"/><path d="M16 6h2v2"/></svg>
        <span>Analyse</span>
      </button>
      <button class="nav-btn green" onclick="tab('marches')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M5 20V9M12 20V4M19 20v-7"/><path d="M3 20h18"/></svg>
        <span>Marchés</span>
      </button>
      <button class="nav-btn blue" onclick="tab('news')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><path d="M6 3h10l2 2v16H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
        <span>News</span>
      </button>
      <button class="nav-btn cyan" onclick="tab('reglages')">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.05.05a2 2 0 0 1-2.83 2.83l-.05-.05A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21h-4v-.07A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.05.05a2 2 0 0 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3v-4h.07A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.05-.05a2 2 0 0 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3h4v.07A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.05-.05a2 2 0 0 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21v4h-.07A1.7 1.7 0 0 0 19.4 15Z"/></svg>
        <span>Réglages</span>
      </button>

        Assistant IA

        <div>
          <h3>Règle IA</h3>
          <p>Chaque analyse vaut comme un support pour ACHAT, VENTE ou ATTENTE, avec une définition : objectif, stop, seuil, profil de risque et horizon temps.</p>

      </div>

</div>

<script>
const LS_TICKER = "pgi_financial_mobile_ticker_values_v1";

const DEFAULT_TICKER = [
  ["CAC 40","8 102,41","+0,42%","up"],["DAX","18 209,83","+0,35%","up"],
  ["NASDAQ","16 920,79","+0,58%","up"],["S&P 500","5 308,15","+0,31%","up"],
  ["EUR/USD","1,0875","-0,12%","down"],["GOLD","2 346,80","+0,23%","up"],
  ["WTI","82,14","-0,21%","down"],["BTC/USD","67 421,90","+1,12%","up"]
];

const clocks = [
  {city:"Paris", tz:"Europe/Paris", open:"09:00", close:"17:30", art:"paris"},
  {city:"Londres", tz:"Europe/London", open:"08:00", close:"16:30", art:"london"},
  {city:"New York", tz:"America/New_York", open:"09:30", close:"16:00", art:"newyork"},
  {city:"Tokyo", tz:"Asia/Tokyo", open:"09:00", close:"15:00", art:"tokyo"},
  {city:"Singapour", tz:"Asia/Singapore", open:"09:00", close:"17:00", art:"singapore"},
  {city:"Hong Kong", tz:"Asia/Hong_Kong", open:"09:30", close:"16:00", art:"hongkong"},
  {city:"Sydney", tz:"Australia/Sydney", open:"10:00", close:"16:00", art:"sydney"}
];

const art = {
paris:`<svg viewBox="0 0 220 70"><path d="M7 65h205"/><path d="M35 64 56 8l21 56M43 42h26M48 29h16M56 8v-5"/><path d="M25 64v-15h10v15M86 64V45h13v19M103 64V36h13v28M122 64V49h11v15M137 64V40h16v24M160 64V52h11v12M176 64V44h18v20"/><path d="M4 64c12-10 24-10 36 0M75 64c10-10 22-10 34 0"/></svg>`,
london:`<svg viewBox="0 0 220 70"><path d="M7 65h205"/><path d="M41 64V18h18v46M38 18h24M46 18V8h8v10M45 32h10M45 44h10"/><circle cx="50" cy="25" r="5"/><path d="M75 64V39h18v25M99 64V30h18v34M123 64V42h16v22M146 64V45h14v19M165 64V51h14v13"/><circle cx="185" cy="55" r="9"/><path d="M185 46v18M176 55h18"/></svg>`,
newyork:`<svg viewBox="0 0 220 70"><path d="M7 65h205"/><path d="M26 64V47h10v17M34 47l-3-11-3 11M31 36v-8"/><path d="M60 64V40h16v24M81 64V31h15v33M101 64V46h12v18M118 64V23h15v41M126 23v-8M139 64V37h18v27M162 64V29h20v35M172 29v-12M188 64V49h17v15"/><path d="M12 64c18-9 31-9 44 0"/></svg>`,
tokyo:`<svg viewBox="0 0 220 70"><path d="M7 65h205"/><path d="M36 64 54 10l18 54M42 42h24M46 30h16M54 10V3M49 20h10"/><path d="M86 64V47h13v17M104 64V39h16v25M125 64V50h11v14M141 64V34h18v30M166 64V45h16v19M188 64V53h18v11"/></svg>`,
singapore:`<svg viewBox="0 0 220 70"><path d="M7 65h205"/><path d="M36 64V35h18v29M66 64V35h18v29M96 64V35h18v29"/><path d="M29 35c35-12 64-12 93 0"/><path d="M28 28h96"/><path d="M139 64c22-22 46-22 69 0"/><circle cx="183" cy="45" r="14"/><path d="M183 31v28M169 45h28"/></svg>`,
hongkong:`<svg viewBox="0 0 220 70"><path d="M7 65h205"/><path d="M38 64V24l12-12 12 12v40M45 31h10M45 43h10"/><path d="M75 64V37h18v27M99 64V27h18v37M123 64V44h16v20M145 64V22h18v42M169 64V29h22v35M180 29V13"/><path d="M194 64V43h16v21"/></svg>`,
sydney:`<svg viewBox="0 0 220 70"><path d="M7 65h205"/><path d="M23 62c15-28 28-28 43 0M43 62c17-35 34-35 52 0M76 62c14-24 25-24 39 0"/><path d="M110 62c20-25 49-25 77 0"/><path d="M116 62c20-39 48-39 75 0"/><path d="M23 62h92M110 62h93"/></svg>`
};

function minutes(t){const [h,m]=t.split(":").map(Number);return h*60+m}
function localParts(tz){
  const now=new Date();
  const parts=new Intl.DateTimeFormat("fr-FR",{timeZone:tz,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).formatToParts(now);
  const get=x=>Number(parts.find(p=>p.type===x).value);
  return {h:get("hour"),m:get("minute"),s:get("second")};
}
function countdownText(nowMin,targetMin,prefix){
  let d=targetMin-nowMin;
  if(d<0)d+=1440;
  const h=Math.floor(d/60), m=d%60;
  return `${prefix} dans ${h}h ${String(m).padStart(2,"0")}m`.replace(" 0"," ");
}
function clockCard(c){
  const p=localParts(c.tz);
  const now=p.h*60+p.m;
  const o=minutes(c.open), cl=minutes(c.close);
  const isOpen=now>=o && now<cl;
  const status=isOpen?"OUVERT":"FERMÉ";
  const cd=isOpen?countdownText(now,cl,"Ferme"):countdownText(now,o,"Ouvre");
  return `<article class="card clock ${isOpen?"open":"closed"}">
    <h3>${c.city}</h3>
    <div class="time">${String(p.h).padStart(2,"0")}:${String(p.m).padStart(2,"0")}:${String(p.s).padStart(2,"0")}</div>
    <div class="status">${status}</div>
    <div class="countdown">${cd}</div>
    <div class="skyline">${art[c.art]}</div>
  </article>`;
}
function renderClocks(){
  const grid=document.getElementById("clocksGrid");
  const firstSix=clocks.slice(0,6).map(clockCard).join("");
  const sydney=clockCard(clocks[6]);
  grid.innerHTML=firstSix+`<div class="sydney-news">${sydney}${newsPanel()}</div>`;
}
function newsPanel(){
  return `<article class="card news-card">
    <div class="news-head"><h2>À la une</h2><div class="live">DÉFILE AUTO</div></div>
    <div class="news-scroll" id="newsScroll">
      ${[
        ["🇪🇺","La BCE maintient ses taux, surveille l’inflation et la croissance","il y a 12 min"],
        ["🇺🇸","Wall Street termine en hausse portée par les valeurs technologiques","il y a 28 min"],
        ["🇺🇦","Ukraine : nouvelles discussions pour un cessez-le-feu à venir","il y a 45 min"],
        ["🇨🇳","Chine : la croissance dépasse les attentes au premier trimestre","il y a 1 h"],
        ["🌍","Moyen-Orient : nouvelles tensions surveillées par les marchés","il y a 1 h 20"],
        ["🛰️","Technologie : les semi-conducteurs restent au centre des enjeux","il y a 2 h"]
      ].map(n=>`<div class="news-row" onclick="pauseNews(true)"><div class="news-icon">${n[0]}</div><div><div class="news-title">${n[1]}</div><span class="news-time">${n[2]}</span></div><div class="chev">›</div></div>`).join("")}
    </div>
  </article>`
}
function renderTicker(){
  let data=DEFAULT_TICKER;
  try{
    const saved=JSON.parse(localStorage.getItem(LS_TICKER)||"null");
    if(Array.isArray(saved)&&saved.length)data=saved;
  }catch{}
  const html=data.map(x=>`<div class="ticker-item"><b>${x[0]}</b><span class="price">${x[1]}</span> <span class="${x[3]}">${x[2]}</span></div>`).join("");
  document.getElementById("tickerTrack").innerHTML=html+html;
}
function editTicker(){
  const current=(JSON.parse(localStorage.getItem(LS_TICKER)||"null")||DEFAULT_TICKER).map(x=>x.join("|")).join("\n");
  const txt=prompt("Entre les valeurs à afficher, une par ligne : NOM|PRIX|VARIATION|up ou down",current);
  if(!txt)return;
  const rows=txt.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>{
    const p=l.split("|").map(x=>x.trim());
    return [p[0]||"VALEUR",p[1]||"-",p[2]||"0%",(p[3]||"up").toLowerCase().includes("down")?"down":"up"];
  });
  localStorage.setItem(LS_TICKER,JSON.stringify(rows));
  renderTicker();
}
let newsPaused=false;
function pauseNews(v){newsPaused=v}
function startNewsAutoScroll(){
  setInterval(()=>{
    const el=document.getElementById("newsScroll");
    if(!el||newsPaused)return;
    el.scrollTop+=0.45;
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-1)el.scrollTop=0;
  },35);
  document.addEventListener("pointerdown",e=>{
    if(e.target.closest("#newsScroll")) newsPaused=true;
  });
}
function tab(name){
  if(name==="scanner") alert("Scanner les opportunités immédiates");
}
renderTicker();
renderClocks();
startNewsAutoScroll();
setInterval(renderClocks,1000);
</script>
</body>
</html>
